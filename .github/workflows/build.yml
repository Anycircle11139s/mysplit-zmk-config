name: Build

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    strategy:
      fail-fast: false
      matrix:
        include:
          - board: xiao_ble
            shield: mysplit_left
          - board: xiao_ble
            shield: mysplit_right
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache west modules
        uses: actions/cache@v4
        env:
          cache-name: cache-zephyr-modules
        with:
          path: |
            modules/
            tools/
            zephyr/
            bootloader/
            zmk/
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('config/west.yml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-
      - name: Initialize workspace (west init)
        run: west init -l config
      - name: Update modules (west update)
        run: west update
      - name: Export Zephyr CMake package (west zephyr-export)
        run: west zephyr-export
      - name: Prepare variables
        shell: bash
        run: |
          printf "ZEPHYR_SDK_INSTALL_DIR=/opt/zephyr-sdk\n" >> $GITHUB_ENV
          printf "SHIELD_ARG= -DSHIELD=${{ matrix.shield }}" >> $GITHUB_ENV
      - name: Build (west build)
        run: west build -s zmk/app -b ${{ matrix.board }} -- ${{ env.SHIELD_ARG }} -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
      - name: Rename zmk.uf2
        run: cp build/zephyr/zmk.uf2 ${{ matrix.shield }}-${{ matrix.board }}-zmk.uf2
      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.shield }}
          path: "*.uf2"
